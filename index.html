<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Urna Eletrônica Escolar - Edição Especial</title>
    <style>
      :root {
        --bg-color: #2e7d32; /* Verde Escuro */
        --urna-bg: #e8f5e9; /* Verde Bem Clarinho */
        --panel-bg: #c8e6c9; /* Verde Médio para o Painel */
        --keyboard-bg: #1b5e20; /* Verde Floresta para o Teclado */
        --btn-color: #222;
        --btn-text: #fff;
        --confirm-btn: #4caf50;
        --correct-btn: #ff9800;
        --white-btn: #ffffff;
      }

      body {
        font-family: "Arial", sans-serif;
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        touch-action: manipulation;
      }

      .urna {
        background-color: var(--urna-bg);
        padding: 30px;
        display: flex;
        border: 4px solid #1b5e20;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        border-radius: 15px;
        max-width: 95vw;
        max-height: 90vh;
        position: relative;
      }

      /* Ícone da Escola na Lateral da Urna */
      .urna::after {
        content: "";
        position: absolute;
        top: 20px;
        right: -100px;
        width: 80px;
        height: 80px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        z-index: 5;
      }

      /* Tela da Urna */
      .tela {
        width: 500px;
        height: 350px;
        background: linear-gradient(to bottom right, #f1f8e9, #c8e6c9);
        border: 2px solid #2e7d32;
        padding: 20px;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* Brasão Embutido no Fundo com Opacidade */
      .tela--brasao {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 250px;
        height: 250px;
        background-image: url("img/brasao.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0.15; /* Opacidade ajustada para o fundo */
        z-index: 1;
      }

      .tela--info {
        flex: 1;
        z-index: 2;
      }

      .tela--cargo {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #1b5e20;
      }

      .tela--numero {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
      }

      .numero-box {
        width: 40px;
        height: 55px;
        border: 1px solid #333;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        margin-right: 5px;
        background-color: #fff;
      }

      .numero-box.pisca {
        animation: flash 1s infinite;
      }

      @keyframes flash {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .tela--nome,
      .tela--turma {
        font-size: 18px;
        margin-top: 10px;
        height: 25px;
        width: 65%;
        background: rgba(255, 255, 255, 0.7);
        padding: 2px 8px;
        border-radius: 5px;
        color: #1b5e20;
        font-weight: bold;
      }

      .tela--foto {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 120px;
        height: 150px;
        border: 2px solid #2e7d32;
        background-size: cover;
        background-position: center;
        background-color: #fff;
        display: none;
      }
      .tela--rodape {
        margin-top: auto;
        border-top: 2px solid #2e7d32;
        padding-top: 10px;
        font-size: 14px;
        color: #1b5e20;

        display: flex; /* DEIXA FIXO FLEX */
        justify-content: space-between;
        align-items: center;
      }

      .rodape-texto {
        flex: 1;
      }

      .rodape-logo {
        width: 60px;
        height: auto;
        margin-left: 10px;
        border-radius: 10px;
      }

      /* Teclado da Urna */
      .teclado {
        background-color: var(--keyboard-bg);
        padding: 20px;
        margin-left: 30px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .teclado--linha {
        display: flex;
        justify-content: center;
        margin-bottom: 15px;
      }

      .teclado--botao {
        width: 70px;
        height: 50px;
        background-color: var(--btn-color);
        color: var(--btn-text);
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 10px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px #000;
        user-select: none;
      }

      .teclado--botao:active {
        box-shadow: none;
        transform: translateY(4px);
      }

      .teclado--botao.especial {
        font-size: 12px;
        font-weight: bold;
        color: #000;
        height: 60px;
        width: 90px;
      }

      .btn-branco {
        background-color: var(--white-btn);
      }
      .btn-corrige {
        background-color: var(--correct-btn);
      }
      .btn-confirma {
        background-color: var(--confirm-btn);
        height: 75px;
        align-self: flex-end;
      }

      /* Estilo para FIM */
      .tela--fim {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 90px;
        height: 100%;
        width: 100%;
        font-weight: bold;
        z-index: 10;
        background: #f1f8e9;
        color: #1b5e20;
      }

      /* Painel de Apuração */
      #painel-apuracao {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 100px rgba(0, 0, 0, 0.7);
        z-index: 100;
        width: 90%;
        max-width: 650px;
        max-height: 85vh;
        overflow-y: auto;
        border: 5px solid #2e7d32;
      }

      #painel-apuracao h2 {
        margin-top: 0;
        text-align: center;
        color: #1b5e20;
        border-bottom: 2px solid #c8e6c9;
        padding-bottom: 10px;
      }

      .tabela-votos {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      .tabela-votos th,
      .tabela-votos td {
        border: 1px solid #c8e6c9;
        padding: 12px;
        text-align: left;
      }

      .tabela-votos th {
        background-color: #e8f5e9;
        color: #1b5e20;
      }

      .vencedor {
        background-color: #fff9c4;
        font-weight: bold;
      }

      .controles-admin {
        position: fixed;
        bottom: 10px;
        left: 10px;
        display: flex;
        gap: 10px;
      }

      .btn-admin {
        padding: 8px 15px;
        background: #1b5e20;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 12px;
        opacity: 0.5;
      }

      .btn-admin:hover {
        opacity: 1;
      }

      @media (max-width: 800px) {
        .urna {
          flex-direction: column;
          padding: 15px;
          align-items: center;
        }
        .tela {
          width: 90vw;
          height: 250px;
        }
        .teclado {
          margin-left: 0;
          margin-top: 20px;
          padding: 10px;
        }
        .teclado--botao {
          width: 50px;
          height: 40px;
          margin: 0 5px;
        }
        .teclado--botao.especial {
          width: 75px;
          height: 50px;
        }
        .urna::after {
          right: 10px;
          top: -90px;
        }
      }
    </style>
  </head>
  <body>
    <div class="urna">
      <div class="tela">
        <div class="tela--brasao"></div>
        <div class="tela--info" id="tela-info">
          <div class="tela--cargo">CARGO</div>
          <div class="tela--numero" id="numeros"></div>
          <div class="tela--nome" id="nome">NOME:</div>
          <div class="tela--turma" id="turma">TURMA:</div>
        </div>
        <div class="tela--foto" id="foto"></div>
        <div class="tela--rodape" id="rodape">
          <div class="rodape-texto">
            APERTE A TECLA:<br />
            CONFIRMA para CONFIRMAR este voto<br />
            CORRIGE para REINICIAR este voto
          </div>

          <img src="img/rodape-logo.png" class="rodape-logo" />
        </div>
      </div>

      <div class="teclado">
        <div class="teclado--linha">
          <div class="teclado--botao" onclick="clicou('1')">1</div>
          <div class="teclado--botao" onclick="clicou('2')">2</div>
          <div class="teclado--botao" onclick="clicou('3')">3</div>
        </div>
        <div class="teclado--linha">
          <div class="teclado--botao" onclick="clicou('4')">4</div>
          <div class="teclado--botao" onclick="clicou('5')">5</div>
          <div class="teclado--botao" onclick="clicou('6')">6</div>
        </div>
        <div class="teclado--linha">
          <div class="teclado--botao" onclick="clicou('7')">7</div>
          <div class="teclado--botao" onclick="clicou('8')">8</div>
          <div class="teclado--botao" onclick="clicou('9')">9</div>
        </div>
        <div class="teclado--linha">
          <div class="teclado--botao" onclick="clicou('0')">0</div>
        </div>
        <div class="teclado--linha">
          <div class="teclado--botao especial btn-branco" onclick="branco()">
            BRANCO
          </div>
          <div class="teclado--botao especial btn-corrige" onclick="corrige()">
            CORRIGE
          </div>
          <div
            class="teclado--botao especial btn-confirma"
            onclick="confirma()"
          >
            CONFIRMA
          </div>
        </div>
      </div>
    </div>

    <div id="painel-apuracao">
      <h2>Relatório de Apuração</h2>
      <div id="resultado-votos"></div>
      <div style="text-align: center; margin-top: 20px">
        <button
          onclick="fecharApuracao()"
          style="padding: 10px 20px; cursor: pointer"
        >
          Fechar
        </button>
      </div>
    </div>

    <div class="controles-admin">
      <button class="btn-admin" onclick="mostrarApuracao()">Apuração</button>
      <button class="btn-admin" onclick="limparVotos()">Zerar Urna</button>
    </div>

    <audio
      id="audio-tecla"
      src="https://www.tse.jus.br/hotsites/simulador-de-votacao/assets/audios/tecla.mp3"
    ></audio>
    <audio id="audio-fim" src="confirma-urna.mp3"></audio>

    <script>
      // Configuração dos Candidatos
      const candidatos = [
        {
          numero: "10",
          nome: "Mel",
          turma: "5⁰ ano A",
          foto: "img/10.jpeg",
        },
        {
          numero: "11",
          nome: "Isabella",
          turma: "6⁰ ano B",
          foto: "img/11.jpeg",
        },
        {
          numero: "12",
          nome: "João Lucas",
          turma: "5⁰ ano C",
          foto: "img/12.jpeg",
        },
        {
          numero: "13",
          nome: "Ana Laura",
          turma: "5⁰ ano D",
          foto: "img/13.jpeg",
        },
      ];

      let etapaAtiva = true;
      let numeroDigitado = "";
      let votoEmBranco = false;

      const elNumeros = document.getElementById("numeros");
      const elCargo = document.querySelector(".tela--cargo");
      const elNome = document.getElementById("nome");
      const elTurma = document.getElementById("turma");
      const elFoto = document.getElementById("foto");
      const elRodape = document.getElementById("rodape");
      const elTelaInfo = document.getElementById("tela-info");

      function iniciarEtapa() {
        etapaAtiva = true;
        numeroDigitado = "";
        votoEmBranco = false;

        elCargo.innerHTML = "REPRESENTANTE DE TURMA";
        elNome.style.display = "none";
        elTurma.style.display = "none";
        elFoto.style.display = "none";
        elRodape.style.display = "none";

        let htmlNumeros = "";
        for (let i = 0; i < 2; i++) {
          htmlNumeros += `<div class="numero-box ${i === 0 ? "pisca" : ""}"></div>`;
        }
        elNumeros.innerHTML = htmlNumeros;
      }

      function clicou(n) {
        if (!etapaAtiva || votoEmBranco) return;

        document
          .getElementById("audio-tecla")
          .play()
          .catch((e) => console.log("Áudio bloqueado"));

        if (numeroDigitado.length < 2) {
          numeroDigitado += n;
          atualizarInterface();
        }
      }

      function atualizarInterface() {
        const boxes = elNumeros.querySelectorAll(".numero-box");
        boxes.forEach((box, index) => {
          box.innerHTML = numeroDigitado[index] || "";
          box.classList.remove("pisca");
        });

        if (numeroDigitado.length < 2) {
          boxes[numeroDigitado.length].classList.add("pisca");
        } else {
          let candidato = candidatos.find(
            (item) => item.numero === numeroDigitado,
          );
          if (candidato) {
            elNome.style.display = "block";
            elTurma.style.display = "block";
            elFoto.style.display = "block";
            elRodape.style.display = "flex";
            elNome.innerHTML = `NOME: ${candidato.nome}`;
            elTurma.innerHTML = `TURMA: ${candidato.turma}`;
            elFoto.style.backgroundImage = `url(${candidato.foto})`;
          } else {
            elNome.style.display = "block";
            elNome.innerHTML = "<br/>VOTO NULO";
            elRodape.style.display = "flex";
          }
        }
      }

      function branco() {
        if (!etapaAtiva) return;
        numeroDigitado = "";
        votoEmBranco = true;
        elNumeros.innerHTML = "";
        elNome.style.display = "block";
        elNome.innerHTML = "<br/>VOTO EM BRANCO";
        elTurma.style.display = "none";
        elFoto.style.display = "none";
        elRodape.style.display = "block";
      }

      function corrige() {
        if (!etapaAtiva) return;
        iniciarEtapa();
      }

      function confirma() {
        if (!etapaAtiva) return;

        let tipoVoto = "";
        if (votoEmBranco) {
          tipoVoto = "BRANCO";
        } else if (numeroDigitado.length === 2) {
          let candidato = candidatos.find(
            (item) => item.numero === numeroDigitado,
          );
          tipoVoto = candidato ? numeroDigitado : "NULO";
        }

        if (tipoVoto !== "") {
          salvarVoto(tipoVoto);
          document
            .getElementById("audio-fim")
            .play()
            .catch((e) => console.log("Áudio bloqueado"));
          elTelaInfo.innerHTML = '<div class="tela--fim">FIM</div>';
          elFoto.style.display = "none";
          elRodape.style.display = "none";
          etapaAtiva = false;

          setTimeout(() => {
            location.reload();
          }, 3000);
        }
      }

      function salvarVoto(voto) {
        let votos = JSON.parse(localStorage.getItem("votos_urna")) || [];
        votos.push(voto);
        localStorage.setItem("votos_urna", JSON.stringify(votos));
      }

      function mostrarApuracao() {
        const votos = JSON.parse(localStorage.getItem("votos_urna")) || [];
        const contagem = {};

        candidatos.forEach((c) => (contagem[c.numero] = 0));
        contagem["BRANCO"] = 0;
        contagem["NULO"] = 0;

        votos.forEach((v) => {
          if (contagem[v] !== undefined) contagem[v]++;
          else contagem["NULO"]++;
        });

        let maxVotos = -1;
        let vencedorNumero = "";
        candidatos.forEach((c) => {
          if (contagem[c.numero] > maxVotos) {
            maxVotos = contagem[c.numero];
            vencedorNumero = c.numero;
          } else if (contagem[c.numero] === maxVotos && maxVotos > 0) {
            vencedorNumero = "EMPATE";
          }
        });

        let html = `<p style="text-align:center; font-size:1.2em;">Total de Votos Computados: <strong>${votos.length}</strong></p>`;
        html +=
          '<table class="tabela-votos"><tr><th>Candidato / Aluno</th><th>Votos</th></tr>';

        candidatos.forEach((c) => {
          const isVencedor = c.numero === vencedorNumero && maxVotos > 0;
          html += `<tr class="${isVencedor ? "vencedor" : ""}">
                    <td>${c.numero} - ${c.nome} ${isVencedor ? "🏆" : ""}</td>
                    <td>${contagem[c.numero]}</td>
                </tr>`;
        });

        html += `<tr><td>Votos em BRANCO</td><td>${contagem["BRANCO"]}</td></tr>`;
        html += `<tr><td>Votos NULOS</td><td>${contagem["NULO"]}</td></tr>`;
        html += "</table>";

        document.getElementById("resultado-votos").innerHTML = html;
        document.getElementById("painel-apuracao").style.display = "block";
      }

      function fecharApuracao() {
        document.getElementById("painel-apuracao").style.display = "none";
      }

      function limparVotos() {
        if (
          confirm(
            "ATENÇÃO: Deseja realmente APAGAR TODOS os votos e zerar a urna?",
          )
        ) {
          localStorage.removeItem("votos_urna");
          alert("Urna zerada com sucesso!");
          location.reload();
        }
      }

      iniciarEtapa();
    </script>
  </body>
</html>
